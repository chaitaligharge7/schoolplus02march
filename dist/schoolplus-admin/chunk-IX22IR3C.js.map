<div class="marksheet-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit' : 'Create' }} Marksheet</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update marksheet details' : 'Create a new marksheet for student' }}</p>
    </div>
    <button class="btn btn-secondary" (click)="router.navigate(['/app/marksheets'])">
      <i class="bi bi-arrow-left"></i>
      Back to Marksheets
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="marksheetForm" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Basic Information</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Examination <span class="required">*</span></label>
            <select formControlName="examination_id" class="form-control" (change)="onExaminationChange()">
              <option [value]="null">Select Examination</option>
              <option *ngFor="let exam of examinations" [value]="exam.examination_id">
                {{ exam.examination_name }}
              </option>
            </select>
          </div>
          <div class="form-group">
            <label>Student <span class="required">*</span></label>
            <select formControlName="student_id" class="form-control">
              <option [value]="null">Select Student</option>
              <option *ngFor="let student of students" [value]="student.student_id">
                {{ student.first_name }} {{ student.last_name }} ({{ student.admission_number }})
              </option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>Marks Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Total Marks</label>
            <input type="number" formControlName="total_marks" class="form-control" step="0.01" />
          </div>
          <div class="form-group">
            <label>Obtained Marks</label>
            <input type="number" formControlName="obtained_marks" class="form-control" step="0.01" />
          </div>
          <div class="form-group">
            <label>Percentage</label>
            <input type="number" formControlName="percentage" class="form-control" step="0.01" />
          </div>
          <div class="form-group">
            <label>Grade</label>
            <input type="text" formControlName="grade" class="form-control" maxlength="10" />
          </div>
          <div class="form-group">
            <label>Rank</label>
            <input type="number" formControlName="rank" class="form-control" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>File Upload</h3>
        <div class="form-group">
          <label>Marksheet File (PDF/Image)</label>
          <input type="file" id="marksheet_file" class="form-control" accept=".pdf,.jpg,.jpeg,.png" />
          <small class="form-text">Upload marksheet PDF or image file</small>
        </div>
      </div>

      <div class="form-section">
        <h3>Status</h3>
        <div class="form-group">
          <label>Status</label>
          <select formControlName="status" class="form-control">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
            <option value="sent">Sent</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="router.navigate(['/app/marksheets'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving">
          <i class="bi bi-save" *ngIf="!isSaving"></i>
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Marksheet</span>
        </button>
        <button 
          type="button" 
          class="btn btn-success" 
          *ngIf="isEditMode && marksheetId && marksheetForm.get('status')?.value === 'published'"
          (click)="sendToWhatsApp()"
          [disabled]="isSaving">
          <i class="bi bi-whatsapp"></i> Send to WhatsApp
        </button>
        <button 
          type="button" 
          class="btn btn-info" 
          *ngIf="isEditMode && marksheetId"
          (click)="notifyParent()"
          [disabled]="isSaving">
          <i class="bi bi-bell"></i> Notify Parent
        </button>
      </div>
    </form>
  </div>
</div>
