<div class="complaint-create-container">
  <div class="page-header">
    <h1 class="page-title">{{ isEditMode ? 'Edit Complaint' : 'Create Complaint' }}</h1>
    <p class="page-subtitle">{{ isEditMode ? 'Update complaint details' : 'Register a new complaint' }}</p>
  </div>

  <div class="form-card" *ngIf="!isLoading">
    <form [formGroup]="complaintForm" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Complaint Information</h3>
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Complaint Title <span class="required">*</span></label>
            <input
              type="text"
              formControlName="complaint_title"
              class="form-control"
              [class.is-invalid]="complaintForm.get('complaint_title')?.invalid && complaintForm.get('complaint_title')?.touched"
              placeholder="Enter complaint title"
            />
            <div class="invalid-feedback" *ngIf="complaintForm.get('complaint_title')?.invalid && complaintForm.get('complaint_title')?.touched">
              Complaint title is required
            </div>
          </div>

          <div class="form-group">
            <label>Category <span class="required">*</span></label>
            <select
              formControlName="complaint_category"
              class="form-control"
              [class.is-invalid]="complaintForm.get('complaint_category')?.invalid && complaintForm.get('complaint_category')?.touched"
            >
              <option [value]="null">Select Category</option>
              <option *ngFor="let category of categories" [value]="category.category_name">
                {{ category.category_name }}
              </option>
              <option value="academic">Academic</option>
              <option value="infrastructure">Infrastructure</option>
              <option value="behavior">Behavior</option>
              <option value="other">Other</option>
            </select>
            <div class="invalid-feedback" *ngIf="complaintForm.get('complaint_category')?.invalid && complaintForm.get('complaint_category')?.touched">
              Category is required
            </div>
          </div>

          <div class="form-group">
            <label>Complainant Type <span class="required">*</span></label>
            <select
              formControlName="complainant_type"
              class="form-control"
            >
              <option value="student">Student</option>
              <option value="parent">Parent</option>
              <option value="staff">Staff</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Complainant Name <span class="required">*</span></label>
            <input
              type="text"
              formControlName="complainant_name"
              class="form-control"
              [class.is-invalid]="complaintForm.get('complainant_name')?.invalid && complaintForm.get('complainant_name')?.touched"
              placeholder="Enter complainant name"
            />
            <div class="invalid-feedback" *ngIf="complaintForm.get('complainant_name')?.invalid && complaintForm.get('complainant_name')?.touched">
              Complainant name is required
            </div>
          </div>

          <div class="form-group">
            <label>Priority <span class="required">*</span></label>
            <select
              formControlName="priority"
              class="form-control"
            >
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>

          <div class="form-group">
            <label>Status <span class="required">*</span></label>
            <select
              formControlName="status"
              class="form-control"
            >
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Description <span class="required">*</span></label>
          <textarea
            formControlName="complaint_description"
            class="form-control"
            rows="6"
            [class.is-invalid]="complaintForm.get('complaint_description')?.invalid && complaintForm.get('complaint_description')?.touched"
            placeholder="Enter detailed complaint description"
          ></textarea>
          <div class="invalid-feedback" *ngIf="complaintForm.get('complaint_description')?.invalid && complaintForm.get('complaint_description')?.touched">
            Description is required
          </div>
        </div>

        <div class="form-group">
          <label>Remarks</label>
          <textarea
            formControlName="remarks"
            class="form-control"
            rows="3"
            placeholder="Enter any additional remarks"
          ></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isSaving">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || complaintForm.invalid">
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Complaint</span>
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="isLoading" class="loading-spinner">
    <div class="spinner"></div>
  </div>
</div>
