<div class="attendance-type-list-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Attendance Types</h1>
      <p class="page-subtitle">Manage attendance types for marking attendance</p>
    </div>
  </div>

  <app-enhanced-table
    [data]="attendanceTypes"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [selectedRowId]="selectedRowId"
    [rowIdKey]="'attendance_type_id'"
    [addRoute]="'/app/attendance-types/create'"
    [addLabel]="'Add Attendance Type'"
    [searchPlaceholder]="'Search attendance types...'"
    [enableExport]="true"
    [enableDateFilter]="true"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (dateFilterChange)="onDateFilterChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"
    (deleteClick)="onDelete($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
