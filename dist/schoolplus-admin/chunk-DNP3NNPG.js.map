<div class="participation-list-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Student Participation</h1>
      <p class="page-subtitle">Track student participation in events and activities</p>
    </div>
  </div>

  <!-- Additional Filters -->
  <div class="additional-filters filter-panel" [class.expanded]="showFilters">
    <div class="filter-group">
      <label>Academic Year:</label>
      <select class="form-control" [(ngModel)]="academicYearId" (change)="onAcademicYearChange(academicYearId)">
        <option [value]="undefined">All Academic Years</option>
        <option *ngFor="let year of academicYears" [value]="year.academic_year_id">
          {{ year.academic_year_name }}
        </option>
      </select>
    </div>
    <div class="filter-group">
      <label>Participation Type:</label>
      <select class="form-control" [(ngModel)]="participationType" (change)="onParticipationTypeChange(participationType)">
        <option [value]="undefined">All Types</option>
        <option value="sports">Sports</option>
        <option value="cultural">Cultural</option>
        <option value="academic">Academic</option>
        <option value="other">Other</option>
      </select>
    </div>
  </div>

  <app-enhanced-table
    [data]="participations"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [selectedRowId]="selectedRowId"
    [rowIdKey]="'participation_id'"
    [addRoute]="'/app/student-participation/create'"
    [addLabel]="'Add Participation'"
    [searchPlaceholder]="'Search by student name or event...'"
    [enableExport]="true"
    [enableDateFilter]="true"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (dateFilterChange)="onDateFilterChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
