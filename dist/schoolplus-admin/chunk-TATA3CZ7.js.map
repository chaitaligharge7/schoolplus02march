<div class="branch-create-container">
  <div class="page-header">
    <h1 class="page-title">{{ editId ? 'Edit Branch' : 'Add Branch' }}</h1>
    <p class="page-subtitle">{{ editId ? 'Update branch details' : 'Create a new school branch' }}</p>
  </div>
  <form (ngSubmit)="save()" class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Branch Name *</label>
        <input type="text" class="form-control" [(ngModel)]="model.branch_name" name="branch_name" required />
      </div>
      <div class="form-group">
        <label>Branch Code</label>
        <input type="text" class="form-control" [(ngModel)]="model.branch_code" name="branch_code" />
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea class="form-control" [(ngModel)]="model.address" name="address" rows="2"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City</label>
        <input type="text" class="form-control" [(ngModel)]="model.city" name="city" />
      </div>
      <div class="form-group">
        <label>State</label>
        <input type="text" class="form-control" [(ngModel)]="model.state" name="state" />
      </div>
      <div class="form-group">
        <label>Pincode</label>
        <input type="text" class="form-control" [(ngModel)]="model.pincode" name="pincode" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" class="form-control" [(ngModel)]="model.phone" name="phone" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="model.email" name="email" />
      </div>
    </div>
    <div class="form-group" *ngIf="editId">
      <label>Status</label>
      <select class="form-control" [(ngModel)]="model.is_active" name="is_active">
        <option [ngValue]="1">Active</option>
        <option [ngValue]="0">Inactive</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Save' }}</button>
    </div>
  </form>
</div>
