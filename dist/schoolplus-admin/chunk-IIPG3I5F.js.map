<div class="mess-complaint-create-container">
  <div class="page-header">
    <h1 class="page-title">{{ isEditMode ? 'Edit Mess Complaint' : 'Create Mess Complaint' }}</h1>
    <p class="page-subtitle">{{ isEditMode ? 'Update complaint details' : 'Create a new mess complaint' }}</p>
  </div>

  <div class="form-card" *ngIf="!isLoading">
    <form [formGroup]="complaintForm" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Complaint Information</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Student <span class="required">*</span></label>
            <select
              formControlName="student_id"
              class="form-control"
              [class.is-invalid]="complaintForm.get('student_id')?.invalid && complaintForm.get('student_id')?.touched"
            >
              <option [value]="null">Select Student</option>
              <option *ngFor="let student of students" [value]="student.student_id">
                {{ student.first_name }} {{ student.last_name }} ({{ student.admission_number }})
              </option>
            </select>
            <div class="invalid-feedback" *ngIf="complaintForm.get('student_id')?.invalid && complaintForm.get('student_id')?.touched">
              Student selection is required
            </div>
          </div>

          <div class="form-group">
            <label>Complaint Date <span class="required">*</span></label>
            <input
              type="date"
              formControlName="complaint_date"
              class="form-control"
              [class.is-invalid]="complaintForm.get('complaint_date')?.invalid && complaintForm.get('complaint_date')?.touched"
            />
            <div class="invalid-feedback" *ngIf="complaintForm.get('complaint_date')?.invalid && complaintForm.get('complaint_date')?.touched">
              Complaint date is required
            </div>
          </div>

          <div class="form-group">
            <label>Complaint Type <span class="required">*</span></label>
            <select
              formControlName="complaint_type"
              class="form-control"
            >
              <option value="food_quality">Food Quality</option>
              <option value="food_quantity">Food Quantity</option>
              <option value="hygiene">Hygiene</option>
              <option value="service">Service</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Status <span class="required">*</span></label>
            <select
              formControlName="status"
              class="form-control"
            >
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Subject <span class="required">*</span></label>
          <input
            type="text"
            formControlName="subject"
            class="form-control"
            [class.is-invalid]="complaintForm.get('subject')?.invalid && complaintForm.get('subject')?.touched"
            placeholder="Enter complaint subject"
          />
          <div class="invalid-feedback" *ngIf="complaintForm.get('subject')?.invalid && complaintForm.get('subject')?.touched">
            Subject is required
          </div>
        </div>

        <div class="form-group">
          <label>Description <span class="required">*</span></label>
          <textarea
            formControlName="complaint_description"
            class="form-control"
            rows="5"
            [class.is-invalid]="complaintForm.get('complaint_description')?.invalid && complaintForm.get('description')?.touched"
            placeholder="Enter detailed complaint description"
          ></textarea>
          <div class="invalid-feedback" *ngIf="complaintForm.get('complaint_description')?.invalid && complaintForm.get('description')?.touched">
            Description is required
          </div>
        </div>


        <div class="form-group" *ngIf="isEditMode && complaintForm.get('status')?.value === 'resolved'">
  <label>Resolution Notes</label>
  <textarea
    formControlName="resolution_notes"
    class="form-control"
  ></textarea>
</div>

<div class="form-group" *ngIf="isEditMode && complaintForm.get('status')?.value === 'resolved'">
  <label>Resolved Date</label>
  <input
    type="date"
    formControlName="resolved_at"
    class="form-control"
  />
</div>



      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isSaving">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || complaintForm.invalid">
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Complaint</span>
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="isLoading" class="loading-spinner">
    <div class="spinner"></div>
  </div>
</div>
