<div class="department-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Department' : 'Create Department' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update department details' : 'Add a new department' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/departments'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="departmentForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Department Name *</label>
          <input
            type="text"
            formControlName="department_name"
            class="form-control"
            placeholder="e.g., Mathematics, Science"
            required
          />
        </div>

        <div class="form-group">
          <label>Department Code</label>
          <input
            type="text"
            formControlName="department_code"
            class="form-control"
            placeholder="e.g., MATH, SCI"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Department Head</label>
        <select formControlName="department_head_id" class="form-control">
          <option [value]="null">Select Department Head</option>
          <option *ngFor="let teacher of teachers" [value]="teacher.teacher_id">
            {{ teacher.full_name }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          formControlName="department_description"
          class="form-control"
          rows="3"
          placeholder="Enter department description..."
        ></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/departments'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || departmentForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Department</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
