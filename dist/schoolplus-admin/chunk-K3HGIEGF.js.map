<div class="staff-allotment-create-container">
  <div class="page-header">
    <h1 class="page-title">{{ isEditMode ? 'Edit Staff Allotment' : 'Create Staff Allotment' }}</h1>
    <p class="page-subtitle">{{ isEditMode ? 'Update staff assignment' : 'Assign staff to class and subject' }}</p>
  </div>

  <div class="form-card" *ngIf="!isLoading">
    <form [formGroup]="allotmentForm" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Allotment Information</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Staff Member <span class="required">*</span></label>
            <select
              formControlName="teacher_id"
              class="form-control"
              [class.is-invalid]="allotmentForm.get('teacher_id')?.invalid && allotmentForm.get('teacher_id')?.touched"
            >
              <option [value]="null">Select Staff Member</option>
              <option *ngFor="let staff of staffMembers" [value]="staff.teacher_id">
                {{ staff.first_name }} {{ staff.last_name }} ({{ staff.employee_id }})
              </option>
            </select>
            <div class="invalid-feedback" *ngIf="allotmentForm.get('teacher_id')?.invalid && allotmentForm.get('teacher_id')?.touched">
              Staff member is required
            </div>
          </div>

          <div class="form-group">
            <label>Class <span class="required">*</span></label>
            <select
              formControlName="class_id"
              class="form-control"
              [class.is-invalid]="allotmentForm.get('class_id')?.invalid && allotmentForm.get('class_id')?.touched"
            >
              <option [value]="null">Select Class</option>
              <option *ngFor="let cls of classes" [value]="cls.class_id">
                {{ cls.class_name }}
              </option>
            </select>
            <div class="invalid-feedback" *ngIf="allotmentForm.get('class_id')?.invalid && allotmentForm.get('class_id')?.touched">
              Class is required
            </div>
          </div>

          <div class="form-group">
            <label>Subject <span class="required">*</span></label>
            <select
              formControlName="subject_id"
              class="form-control"
              [class.is-invalid]="allotmentForm.get('subject_id')?.invalid && allotmentForm.get('subject_id')?.touched"
            >
              <option [value]="null">Select Subject</option>
              <option *ngFor="let subject of subjects" [value]="subject.subject_id">
                {{ subject.subject_name }}
              </option>
            </select>
            <div class="invalid-feedback" *ngIf="allotmentForm.get('subject_id')?.invalid && allotmentForm.get('subject_id')?.touched">
              Subject is required
            </div>
          </div>

          <div class="form-group">
            <label>Allotment Date <span class="required">*</span></label>
            <input
              type="date"
              formControlName="allotment_date"
              class="form-control"
              [class.is-invalid]="allotmentForm.get('allotment_date')?.invalid && allotmentForm.get('allotment_date')?.touched"
            />
            <div class="invalid-feedback" *ngIf="allotmentForm.get('allotment_date')?.invalid && allotmentForm.get('allotment_date')?.touched">
              Allotment date is required
            </div>
          </div>

          <div class="form-group">
            <label>Status <span class="required">*</span></label>
            <select
              formControlName="status"
              class="form-control"
            >
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Remarks</label>
          <textarea
            formControlName="remarks"
            class="form-control"
            rows="3"
            placeholder="Enter any additional remarks"
          ></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isSaving">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || allotmentForm.invalid">
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Allotment</span>
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="isLoading" class="loading-spinner">
    <div class="spinner"></div>
  </div>
</div>
