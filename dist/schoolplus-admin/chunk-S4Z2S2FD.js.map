<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Register Inquiry</h1>
    <p class="page-subtitle">Register a new visitor inquiry at the gate</p>
  </div>
  <form (ngSubmit)="save()" class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Visitor Name *</label>
        <input type="text" class="form-control" [(ngModel)]="model.visitor_name" name="visitor_name" required />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" class="form-control" [(ngModel)]="model.visitor_phone" name="visitor_phone" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>ID Type</label>
        <input type="text" class="form-control" [(ngModel)]="model.visitor_id_type" name="visitor_id_type" placeholder="e.g. Aadhaar, Driving License" />
      </div>
      <div class="form-group">
        <label>ID Number</label>
        <input type="text" class="form-control" [(ngModel)]="model.visitor_id_number" name="visitor_id_number" />
      </div>
    </div>
    <div class="form-group">
      <label>Purpose Type *</label>
      <select class="form-control" [(ngModel)]="model.purpose_type" name="purpose_type" required>
        <option *ngFor="let pt of purposeTypes" [value]="pt.value">{{ pt.label }}</option>
      </select>
    </div>
    <div class="form-group">
      <label>Purpose of Visit (details)</label>
      <textarea class="form-control" [(ngModel)]="model.purpose" name="purpose" rows="2" placeholder="Optional details"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Person to Meet *</label>
        <app-search-select
          [options]="personToMeetOptions"
          [(ngModel)]="selectedPersonValue"
          (valueChange)="onPersonSelect($event)"
          placeholder="Search or select teacher / Other"
          name="person_to_meet_select">
        </app-search-select>
        <input
          *ngIf="isPersonOther"
          type="text"
          class="form-control mt-2"
          [(ngModel)]="model.person_to_meet"
          name="person_to_meet_other"
          placeholder="Enter person name" />
      </div>
      <div class="form-group">
        <label>Department</label>
        <app-search-select
          [options]="departmentOptions"
          [(ngModel)]="selectedDepartmentValue"
          (valueChange)="onDepartmentSelect($event)"
          placeholder="Search or select department"
          name="department_select">
        </app-search-select>
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Register' }}</button>
    </div>
  </form>
</div>
