<div class="user-add-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit User' : 'Add User' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update user details' : 'Create a new user account' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/users'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Username *</label>
          <input
            type="text"
            formControlName="username"
            class="form-control"
            placeholder="Enter username"
            required
          />
        </div>

        <div class="form-group">
          <label>Email *</label>
          <input
            type="email"
            formControlName="email"
            class="form-control"
            placeholder="Enter email address"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input
            type="text"
            formControlName="first_name"
            class="form-control"
            placeholder="Enter first name"
            required
          />
        </div>

        <div class="form-group">
          <label>Last Name *</label>
          <input
            type="text"
            formControlName="last_name"
            class="form-control"
            placeholder="Enter last name"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>User Type *</label>
          <select formControlName="user_type" class="form-control" required>
            <option value="Admin">Admin</option>
            <option value="Teacher">Teacher</option>
            <option value="Parent">Parent</option>
            <option value="Student">Student</option>
            <option value="Accountant">Accountant</option>
            <option value="Librarian">Librarian</option>
          </select>
        </div>

        <div class="form-group">
          <label>Mobile</label>
          <input
            type="text"
            formControlName="mobile"
            class="form-control"
            placeholder="Enter mobile number"
          />
        </div>
      </div>

      <div class="form-group">
        <label>
          <input
            type="checkbox"
            formControlName="is_active"
            [checked]="userForm.get('is_active')?.value == 1"
            (change)="onActiveChange($event)"
          />
          Active User
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/users'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || userForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} User</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
