<div class="hostel-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Hostel' : 'Create Hostel' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update hostel details' : 'Add a new hostel' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/hostel'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="hostelForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Hostel Name *</label>
          <input
            type="text"
            formControlName="hostel_name"
            class="form-control"
            placeholder="Enter hostel name"
            required
          />
        </div>

        <div class="form-group">
          <label>Hostel Code *</label>
          <input
            type="text"
            formControlName="hostel_code"
            class="form-control"
            placeholder="Enter unique hostel code"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Hostel Type *</label>
          <select formControlName="hostel_type" class="form-control" required>
            <option value="Boys">Boys</option>
            <option value="Girls">Girls</option>
            <option value="Mixed">Mixed</option>
          </select>
        </div>

        <div class="form-group">
          <label>Gender *</label>
          <select formControlName="gender" class="form-control" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea
          formControlName="address"
          class="form-control"
          rows="3"
          placeholder="Enter hostel address..."
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Warden Name</label>
          <input
            type="text"
            formControlName="warden_name"
            class="form-control"
            placeholder="Enter warden name"
          />
        </div>

        <div class="form-group">
          <label>Warden Contact</label>
          <input
            type="text"
            formControlName="warden_contact"
            class="form-control"
            placeholder="Enter warden contact number"
          />
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/hostel'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || hostelForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Hostel</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
