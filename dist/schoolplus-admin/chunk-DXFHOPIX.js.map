<div class="public-enquiry-page">
  <div class="public-enquiry-card" *ngIf="!submitted">
    <h1 class="title">Student Enquiry</h1>
    <p class="subtitle">Submit your enquiry. Reception will be notified and will contact you.</p>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Student Information</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Student Name <span class="required">*</span></label>
            <input type="text" formControlName="student_name" class="form-control" />
            <small class="error" *ngIf="form.get('student_name')?.invalid && form.get('student_name')?.touched">Required</small>
          </div>
          <div class="form-group">
            <label>Parent Name <span class="required">*</span></label>
            <input type="text" formControlName="parent_name" class="form-control" />
            <small class="error" *ngIf="form.get('parent_name')?.invalid && form.get('parent_name')?.touched">Required</small>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Mobile <span class="required">*</span></label>
            <input type="tel" formControlName="mobile" class="form-control" maxlength="10" placeholder="10 digits" />
            <small class="error" *ngIf="form.get('mobile')?.invalid && form.get('mobile')?.touched">Valid 10-digit number required</small>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email" class="form-control" />
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea formControlName="address" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="form-section">
        <h3>Enquiry Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Interested Class</label>
            <select formControlName="interested_class_id" class="form-control">
              <option [value]="null">Select Class</option>
              <option *ngFor="let cls of classes" [value]="cls.class_id">{{ cls.class_name }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>Source <span class="required">*</span></label>
            <select formControlName="enquiry_source" class="form-control">
              <option value="online">Online</option>
              <option value="walk-in">Walk-in</option>
              <option value="referral">Referral</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Remarks</label>
          <textarea formControlName="remarks" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="isSaving">
          {{ isSaving ? 'Submitting...' : 'Submit Enquiry' }}
        </button>
      </div>
    </form>
  </div>
  <div class="public-enquiry-card success-card" *ngIf="submitted">
    <i class="bi bi-check-circle-fill success-icon"></i>
    <h2>Thank you</h2>
    <p>Your enquiry has been submitted. Our reception team will contact you shortly.</p>
  </div>
</div>
