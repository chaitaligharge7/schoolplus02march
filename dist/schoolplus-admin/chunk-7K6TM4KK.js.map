<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">{{ isEdit ? 'Edit Ticket' : 'Submit Support / Feedback' }}</h1>
  </div>
  <form (ngSubmit)="save()" class="form-card">
    <div class="form-group">
      <label>Type</label>
      <select class="form-control" [(ngModel)]="model.ticket_type" name="ticket_type">
        <option value="feedback">Feedback</option>
        <option value="support">Support</option>
        <option value="complaint">Complaint</option>
      </select>
    </div>
    <div class="form-group">
      <label>Subject *</label>
      <input type="text" class="form-control" [(ngModel)]="model.subject" name="subject" required />
    </div>
    <div class="form-group">
      <label>Message *</label>
      <textarea class="form-control" [(ngModel)]="model.message" name="message" rows="5" required></textarea>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? (isEdit ? 'Updating...' : 'Submitting...') : (isEdit ? 'Update' : 'Submit') }}
      </button>
    </div>
  </form>
</div>
