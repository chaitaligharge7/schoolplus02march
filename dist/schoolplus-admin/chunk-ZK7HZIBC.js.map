<div class="timetable-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Create Timetable Entry</h1>
      <p class="page-subtitle">Add a new period to class timetable</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/timetable'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="timetableForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Class *</label>
          <select formControlName="class_id" class="form-control" required>
            <option [value]="null">Select Class</option>
            <option *ngFor="let cls of classes" [value]="cls.class_id">
              {{ cls.class_name }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Section</label>
          <select formControlName="section_id" class="form-control">
            <option [value]="null">All Sections</option>
            <option *ngFor="let section of sections" [value]="section.section_id">
              {{ section.section_name }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Subject *</label>
          <select formControlName="subject_id" class="form-control" required>
            <option [value]="null">Select Subject</option>
            <option *ngFor="let subject of subjects" [value]="subject.subject_id">
              {{ subject.subject_name }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Teacher *</label>
          <select formControlName="teacher_id" class="form-control" required>
            <option [value]="null">Select Teacher</option>
            <option *ngFor="let teacher of teachers" [value]="teacher.teacher_id">
              {{ teacher.full_name }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Period *</label>
          <select formControlName="period_id" class="form-control" required>
            <option [value]="null">Select Period</option>
            <option *ngFor="let period of periods" [value]="period.period_id">
              {{ period.period_name }} ({{ period.start_time }} - {{ period.end_time }})
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Day of Week *</label>
          <select formControlName="day_of_week" class="form-control" required>
            <option *ngFor="let day of daysOfWeek" [value]="day">
              {{ day }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Room Number</label>
        <input
          type="text"
          formControlName="room_number"
          class="form-control"
          placeholder="Enter room number (optional)"
        />
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/timetable'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || timetableForm.invalid">
          <span *ngIf="!isSaving">Create Entry</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
