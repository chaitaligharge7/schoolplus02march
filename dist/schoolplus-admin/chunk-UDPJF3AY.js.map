<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Doubt Handling</h1>
    <p class="page-subtitle">Student doubts and teacher responses</p>
  </div>
  <div class="filters" *ngIf="true">
    <div class="filter-group">
      <label>Status</label>
      <select class="form-control" [(ngModel)]="status" (change)="onStatusChange(status)">
        <option [value]="undefined">All</option>
        <option value="pending">Pending</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
    </div>
  </div>
  <app-enhanced-table
    [data]="doubts"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [addRoute]="'/app/doubt-handling/create'"
    [addLabel]="'Add Doubt'"
    [searchPlaceholder]="'Search...'"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"      
    (deleteClick)="onDelete($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
