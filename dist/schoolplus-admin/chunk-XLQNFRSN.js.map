<div class="class-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Class' : 'Create Class' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update class details' : 'Add a new class' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/classes'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="classForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Class Name *</label>
          <input
            type="text"
            formControlName="class_name"
            class="form-control"
            placeholder="e.g., Grade 1, Class 5"
            required
          />
        </div>

        <div class="form-group">
          <label>Class Code</label>
          <input
            type="text"
            formControlName="class_code"
            class="form-control"
            placeholder="e.g., G1, C5"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Class Level</label>
          <input
            type="number"
            formControlName="class_level"
            class="form-control"
            placeholder="e.g., 1, 2, 3"
            min="1"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Class Teacher</label>
          <app-search-select
            [options]="teacherOptions"
            formControlName="class_teacher_id"
            placeholder="Search or select class teacher">
          </app-search-select>
        </div>

        <div class="form-group">
          <label>Class Capacity</label>
          <input
            type="number"
            formControlName="class_capacity"
            class="form-control"
            placeholder="Maximum students"
            min="1"
          />
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/classes'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || classForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Class</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
