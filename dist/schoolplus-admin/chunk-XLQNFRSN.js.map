<div class="class-list-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Classes</h1>
      <p class="page-subtitle">Manage classes for your school</p>
    </div>
    <div class="filter-panel header-dropdowns" [class.expanded]="showFilters" *ngIf="academicYears.length > 0">
      <div class="filter-group">
        <label>Academic Year:</label>
        <app-search-select
          [options]="academicYearOptions"
          [(ngModel)]="academicYearId"
          (valueChange)="onAcademicYearChange($event)"
          placeholder="Search or select academic year">
        </app-search-select>
      </div>
    </div>
  </div>

  <app-enhanced-table
    [data]="classes"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [selectedRowId]="selectedRowId"
    [rowIdKey]="'class_id'"
    [addRoute]="'/app/classes/create'"
    [addLabel]="'Add Class'"
    [searchPlaceholder]="'Search classes...'"
    [enableExport]="true"
    [enableDateFilter]="true"
    [showViewButton]="true"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (dateFilterChange)="onDateFilterChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"
    (deleteClick)="onDelete($event)"
    (viewClick)="onView($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>

  <app-class-detail-slider
    [visible]="sliderVisible"
    [classItem]="sliderClass"
    (close)="sliderVisible = false">
  </app-class-detail-slider>
</div>
