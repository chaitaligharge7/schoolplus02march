<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Digital Notes & Resources</h1>
    <p class="page-subtitle">Manage notes and learning resources</p>
  </div>
  <app-enhanced-table
    [data]="resources"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [addRoute]="'/app/digital-notes/create'"
    [addLabel]="'Add Resource'"
    [searchPlaceholder]="'Search...'"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"      
    (deleteClick)="onDelete($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
