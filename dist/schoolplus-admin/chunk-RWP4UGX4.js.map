<div class="leave-create-container">
  <div class="page-header">
    <h1 class="page-title">{{ editId ? 'Edit Leave' : 'Apply Leave' }}</h1>
    <p class="page-subtitle">{{ editId ? 'Update leave request' : 'Submit a new leave request' }}</p>
  </div>
  <form (ngSubmit)="save()" class="form-card">
    <div class="form-group">
      <label>Staff (Teacher)</label>
      <select class="form-control" [(ngModel)]="model.teacher_id" name="teacher_id">
        <option [ngValue]="null">Select teacher</option>
        <option *ngFor="let t of teachers" [ngValue]="t.teacher_id">{{ t.full_name || t.first_name + ' ' + t.last_name }}</option>
      </select>
    </div>
    <div class="form-group">
      <label>Leave Type</label>
      <select class="form-control" [(ngModel)]="model.leave_type" name="leave_type">
        <option value="Casual">Casual</option>
        <option value="Sick">Sick</option>
        <option value="Earned">Earned</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Date *</label>
        <input type="date" class="form-control" [(ngModel)]="model.start_date" name="start_date" required />
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" class="form-control" [(ngModel)]="model.end_date" name="end_date" />
      </div>
    </div>
    <div class="form-group">
      <label>Reason</label>
      <textarea class="form-control" [(ngModel)]="model.reason" name="reason" rows="3"></textarea>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Save' }}</button>
    </div>
  </form>
</div>
