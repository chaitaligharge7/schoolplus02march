<div class="connect-us-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Connect Us</h1>
      <p class="page-subtitle">Manage contact information and social media links</p>
    </div>
  </div>

  <div class="form-card" *ngIf="!isLoading">
    <form [formGroup]="connectUsForm" (ngSubmit)="onSubmit()">
      <div class="form-sections">
        <div class="form-section">
          <h3 class="section-title">Contact Information</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Email <span class="required">*</span></label>
              <input
                type="email"
                formControlName="email"
                class="form-control"
                [class.is-invalid]="connectUsForm.get('email')?.invalid && connectUsForm.get('email')?.touched"
                placeholder="info@schoolplus.com"
              />
              <div class="invalid-feedback" *ngIf="connectUsForm.get('email')?.invalid && connectUsForm.get('email')?.touched">
                <span *ngIf="connectUsForm.get('email')?.errors?.['required']">Email is required</span>
                <span *ngIf="connectUsForm.get('email')?.errors?.['email']">Please enter a valid email</span>
              </div>
            </div>

            <div class="form-group">
              <label>Phone <span class="required">*</span></label>
              <input
                type="text"
                formControlName="phone"
                class="form-control"
                [class.is-invalid]="connectUsForm.get('phone')?.invalid && connectUsForm.get('phone')?.touched"
                placeholder="+91 98765 43210"
              />
              <div class="invalid-feedback" *ngIf="connectUsForm.get('phone')?.invalid && connectUsForm.get('phone')?.touched">
                Phone is required
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">Social Media Links</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Facebook URL</label>
              <input
                type="url"
                formControlName="facebook_url"
                class="form-control"
                placeholder="https://facebook.com/yourpage"
              />
            </div>

            <div class="form-group">
              <label>Instagram URL</label>
              <input
                type="url"
                formControlName="instagram_url"
                class="form-control"
                placeholder="https://instagram.com/yourpage"
              />
            </div>

            <div class="form-group">
              <label>Twitter URL</label>
              <input
                type="url"
                formControlName="twitter_url"
                class="form-control"
                placeholder="https://twitter.com/yourpage"
              />
            </div>

            <div class="form-group">
              <label>LinkedIn URL</label>
              <input
                type="url"
                formControlName="linkedin_url"
                class="form-control"
                placeholder="https://linkedin.com/company/yourcompany"
              />
            </div>

            <div class="form-group">
              <label>WhatsApp URL</label>
              <input
                type="url"
                formControlName="whatsapp_url"
                class="form-control"
                placeholder="https://wa.me/919876543210"
              />
            </div>

            <div class="form-group">
              <label>YouTube URL</label>
              <input
                type="url"
                formControlName="youtube_url"
                class="form-control"
                placeholder="https://youtube.com/@yourchannel"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || connectUsForm.invalid">
          <i class="bi bi-save" *ngIf="!isSaving"></i>
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Connect Us</span>
        </button>
      </div>
    </form>
  </div>

  <div class="loading-container" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Loading Connect Us data...</p>
  </div>
</div>
