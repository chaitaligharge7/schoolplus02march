<div class="id-card-create-container">
  <div class="page-header">
    <h1 class="page-title">{{ isEditMode ? 'Edit ID Card Configuration' : 'Create ID Card Configuration' }}</h1>
    <p class="page-subtitle">{{ isEditMode ? 'Update ID card settings' : 'Configure ID card template and settings' }}</p>
  </div>

  <div class="form-card" *ngIf="!isLoading">
    <form [formGroup]="idCardForm" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Card Configuration</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Card Type <span class="required">*</span></label>
            <select
              formControlName="card_type"
              class="form-control"
              [class.is-invalid]="idCardForm.get('card_type')?.invalid && idCardForm.get('card_type')?.touched"
            >
              <option value="student">Student</option>
              <option value="staff">Staff</option>
              <option value="visitor">Visitor</option>
            </select>
            <div class="invalid-feedback" *ngIf="idCardForm.get('card_type')?.invalid && idCardForm.get('card_type')?.touched">
              Card type is required
            </div>
          </div>
          
          <div class="form-group">
            <label>Person Type <span class="required">*</span></label>
            <select
              formControlName="person_type"
              class="form-control"
             (change)="onPersonTypeChange($event)"
  >
            <option value="student">Student</option>
            <option value="staff">Staff</option>
            <option value="visitor">Visitor</option>
            </select>
          </div>
          
           <div class="form-group">
               <label>Select Person <span class="required">*</span></label>
              <select formControlName="person_id" class="form-control">
               <option [ngValue]="null">Select Person</option>
              <option *ngFor="let p of people" [ngValue]="p.id">
                 {{ p.name }}
                </option>
                </select>
                 </div>

           <div class="form-group">
            <label>Class</label>
            <select formControlName="class_id" class="form-control">
           <option [value]="null">All Classes</option>
           <option *ngFor="let cls of classes" [ngValue]="cls.class_id">
           {{ cls.class_name }}
          </option>
         </select>
         </div>

          <div class="form-group">
           <label>Card Template <span class="required">*</span></label>
           <select formControlName="card_template" class="form-control">
           <option [ngValue]="null">Select Template</option>
         <option *ngFor="let template of cardTemplates" [ngValue]="template.value">
           {{ template.label }}
            </option>
          </select>
            </div>

            <div class="form-group">
             <label>Expiry Date</label>
            <input type="date"
            formControlName="expiry_date"
            class="form-control"
           [class.is-invalid]="idCardForm.get('expiry_date')?.invalid && idCardForm.get('expiry_date')?.touched" />
          </div>

          <div class="form-group">
            <label>Status <span class="required">*</span></label>
            <select
              formControlName="status"
              class="form-control"
            >
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div class="form-group">
        <label>Remarks</label>
       <textarea formControlName="remarks" class="form-control"></textarea>
       </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input
              type="checkbox"
              formControlName="include_photo"
              class="form-check-input"
            />
            Include Photo
          </label>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input
              type="checkbox"
              formControlName="include_qr_code"
              class="form-check-input"
            />
            Include QR Code
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isSaving">
          Cancel
        </button>
        <button type="button" class="btn btn-info" (click)="generateCards()" [disabled]="isSaving || idCardForm.invalid" *ngIf="!isEditMode">
          Generate Cards
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || idCardForm.invalid">
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Save' }} Configuration</span>
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="isLoading" class="loading-spinner">
    <div class="spinner"></div>
  </div>
</div>
