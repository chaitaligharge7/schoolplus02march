<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">{{ editId ? 'Edit Event' : 'Add Sports Event' }}</h1>
  </div>
  <form (ngSubmit)="save()" class="form-card">
    <div class="form-group">
      <label>Event Name *</label>
      <input type="text" class="form-control" [(ngModel)]="model.event_name" name="event_name" required />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select class="form-control" [(ngModel)]="model.event_type" name="event_type">
          <option value="tournament">Tournament</option>
          <option value="match">Match</option>
          <option value="practice">Practice</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Event Date</label>
        <input type="date" class="form-control" [(ngModel)]="model.event_date" name="event_date" />
      </div>
      <div class="form-group">
        <label>Venue</label>
        <input type="text" class="form-control" [(ngModel)]="model.venue" name="venue" />
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea class="form-control" [(ngModel)]="model.description" name="description" rows="3"></textarea>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Save' }}</button>
    </div>
  </form>
</div>
