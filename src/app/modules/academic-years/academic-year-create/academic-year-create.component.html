<div class="academic-year-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Academic Year' : 'Create Academic Year' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update academic year details' : 'Add a new academic year' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/academic-years'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="academicYearForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Academic Year Name *</label>
        <input
          type="text"
          formControlName="academic_year_name"
          class="form-control"
          placeholder="e.g., 2024-2025"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Start Date *</label>
          <input
            type="date"
            formControlName="start_date"
            class="form-control"
            required
          />
        </div>

        <div class="form-group">
          <label>End Date *</label>
          <input
            type="date"
            formControlName="end_date"
            class="form-control"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label>
          <input
            type="checkbox"
            formControlName="is_current"
            [checked]="academicYearForm.get('is_current')?.value == 1"
            (change)="onCurrentYearChange($event)"
          />
          Set as Current Academic Year
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/academic-years'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || academicYearForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Academic Year</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
