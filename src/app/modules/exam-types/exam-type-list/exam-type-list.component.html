<div class="exam-type-list-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Exam Types</h1>
      <p class="page-subtitle">Manage exam types for your school</p>
    </div>
  </div>

  <app-enhanced-table
    [data]="examTypes"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [selectedRowId]="selectedRowId"
    [rowIdKey]="'exam_type_id'"
    [addRoute]="'/app/exam-types/create'"
    [addLabel]="'Add Exam Type'"
    [searchPlaceholder]="'Search exam types...'"
    [enableExport]="true"
    [enableDateFilter]="true"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (dateFilterChange)="onDateFilterChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"
    (deleteClick)="onDelete($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
