<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">{{ editId ? 'Edit Page' : 'Add Page' }}</h1>
  </div>
  <form (ngSubmit)="save()" class="form-card">
    <div class="form-row">
      <div class="form-group flex-1">
        <label>Title *</label>
        <input type="text" class="form-control" [(ngModel)]="model.title" name="title" required />
      </div>
      <div class="form-group">
        <label>Slug</label>
        <input type="text" class="form-control" [(ngModel)]="model.slug" name="slug" placeholder="url-friendly-name" />
      </div>
    </div>
    <div class="form-group">
      <label>Meta Description</label>
      <input type="text" class="form-control" [(ngModel)]="model.meta_description" name="meta_description" />
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea class="form-control content-area" [(ngModel)]="model.content" name="content" rows="12"></textarea>
    </div>
    <div class="form-group" *ngIf="editId">
      <label>Published</label>
      <select class="form-control" [(ngModel)]="model.is_published" name="is_published">
        <option [ngValue]="1">Yes</option>
        <option [ngValue]="0">No</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Save' }}</button>
    </div>
  </form>
</div>
