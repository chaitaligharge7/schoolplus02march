<div class="classwork-create-container">
  <div class="page-header">
    <div>
       <h1 class="page-title">{{ isEditMode ? 'Edit Classwork' : 'Create Classwork' }}</h1>
      <p class="page-subtitle">
        {{ isEditMode ? 'Update the classwork assignment' : 'Add a new classwork assignment' }}
      </p>
    </div>
    <button class="btn btn-secondary" (click)="router.navigate(['/app/classwork'])">
      <i class="bi bi-arrow-left"></i>
      Back to Classwork
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="classworkForm" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Basic Information</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Class <span class="required">*</span></label>
            <select formControlName="class_id" class="form-control" (change)="onClassChange()">
              <option [value]="null">Select Class</option>
              <option *ngFor="let cls of classes" [value]="cls.class_id">
                {{ cls.class_name }}
              </option>
            </select>
          </div>
          <div class="form-group">
            <label>Section</label>
            <select formControlName="section_id" class="form-control">
              <option [value]="null">All Sections</option>
              <option *ngFor="let section of sections" [value]="section.section_id">
                {{ section.section_name }}
              </option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Subject <span class="required">*</span></label>
            <select formControlName="subject_id" class="form-control">
              <option [value]="null">Select Subject</option>
              <option *ngFor="let subject of subjects" [value]="subject.subject_id">
                {{ subject.subject_name }}
              </option>
            </select>
          </div>
          <div class="form-group">
            <label>Teacher <span class="required">*</span></label>
            <select formControlName="teacher_id" class="form-control">
              <option [value]="null">Select Teacher</option>
              <option *ngFor="let teacher of teachers" [value]="teacher.teacher_id">
                {{ teacher.first_name }} {{ teacher.last_name }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>Classwork Details</h3>
        <div class="form-row">
          <div class="form-group full-width">
            <label>Title <span class="required">*</span></label>
            <input type="text" formControlName="classwork_title" class="form-control" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full-width">
            <label>Description</label>
            <textarea formControlName="classwork_description" class="form-control" rows="4"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Assigned Date <span class="required">*</span></label>
            <input type="date" formControlName="assigned_date" class="form-control" />
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" formControlName="due_date" class="form-control" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>File Upload</h3>
        <div class="form-group">
          <label>Classwork File (Optional)</label>
          <input type="file" id="classwork_file" class="form-control" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" />
          <small class="form-text">Upload classwork file or materials</small>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="router.navigate(['/app/classwork'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving">
          <i class="bi bi-save" *ngIf="!isSaving"></i>
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update Classwork' : 'Create Classwork' }}</span>        </button>
      </div>
    </form>
  </div>
</div>
