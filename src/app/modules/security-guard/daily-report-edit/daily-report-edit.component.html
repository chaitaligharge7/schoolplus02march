<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Edit Daily Report</h1>
    <p class="page-subtitle">Update security shift report</p>
  </div>
  <div *ngIf="loadingData" class="loading-state">Loading...</div>
  <form *ngIf="!loadingData && model.report_id" (ngSubmit)="save()" class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Report Date</label>
        <input type="date" class="form-control" [(ngModel)]="model.report_date" name="report_date" />
      </div>
      <div class="form-group">
        <label>Shift</label>
        <select class="form-control" [(ngModel)]="model.shift" name="shift">
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
          <option value="night">Night</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Summary</label>
      <textarea class="form-control" [(ngModel)]="model.summary" name="summary" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Incidents (if any)</label>
      <textarea class="form-control" [(ngModel)]="model.incidents" name="incidents" rows="2"></textarea>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Update' }}</button>
    </div>
  </form>
</div>
