<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Issue Gate Pass</h1>
    <p class="page-subtitle">Create a new gate pass for visitor</p>
  </div>
  <form (ngSubmit)="save()" class="form-card">
    <div class="form-group">
      <label>Visitor Name *</label>
      <input type="text" class="form-control" [(ngModel)]="model.visitor_name" name="visitor_name" required />
    </div>
    <div class="form-group">
      <label>Purpose</label>
      <input type="text" class="form-control" [(ngModel)]="model.purpose" name="purpose" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Valid From</label>
        <input type="datetime-local" class="form-control" [(ngModel)]="model.valid_from" name="valid_from" />
      </div>
      <div class="form-group">
        <label>Valid Until</label>
        <input type="datetime-local" class="form-control" [(ngModel)]="model.valid_until" name="valid_until" />
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Issue Pass' }}</button>
    </div>
  </form>
</div>
