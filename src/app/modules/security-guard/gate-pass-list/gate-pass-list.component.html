<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Gate Pass Management</h1>
    <p class="page-subtitle">Issue and track gate passes for visitors</p>
  </div>
  <div class="filters">
    <div class="filter-group">
      <label>Status</label>
      <select class="form-control" [(ngModel)]="status" (change)="onStatusChange(status)">
        <option [value]="undefined">All</option>
        <option value="active">Active</option>
        <option value="used">Used</option>
        <option value="expired">Expired</option>
      </select>
    </div>
  </div>
  <app-enhanced-table
    [data]="gatePasses"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [rowIdKey]="rowIdKey"
    [addRoute]="'/app/security-guard/gate-pass/create'"
    [addLabel]="'Issue Gate Pass'"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"
    (deleteClick)="onDelete($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
