<div class="notes-list-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Important Notes</h1>
      <p class="page-subtitle">Manage important notes and study materials</p>
    </div>
  </div>

  <!-- Additional Filters -->
  <div class="additional-filters filter-panel" [class.expanded]="showFilters">
    <div class="filter-group">
      <label>Academic Year:</label>
      <select class="form-control" [(ngModel)]="academicYearId" (change)="onAcademicYearChange(academicYearId)">
        <option [value]="undefined">All Academic Years</option>
        <option *ngFor="let year of academicYears" [value]="year.academic_year_id">
          {{ year.academic_year_name }}
        </option>
      </select>
    </div>
    <div class="filter-group">
      <label>Class:</label>
      <select class="form-control" [(ngModel)]="classId" (change)="onClassChange(classId)">
        <option [value]="undefined">All Classes</option>
        <option *ngFor="let cls of classes" [value]="cls.class_id">
          {{ cls.class_name }}
        </option>
      </select>
    </div>
    <div class="filter-group">
      <label>Subject:</label>
      <select class="form-control" [(ngModel)]="subjectId" (change)="onSubjectChange(subjectId)">
        <option [value]="undefined">All Subjects</option>
        <option *ngFor="let subject of subjects" [value]="subject.subject_id">
          {{ subject.subject_name }}
        </option>
      </select>
    </div>
    <div class="filter-group">
      <label>Note Type:</label>
      <select class="form-control" [(ngModel)]="noteType" (change)="onNoteTypeChange(noteType)">
        <option [value]="undefined">All Types</option>
        <option value="note">Note</option>
        <option value="formula">Formula</option>
        <option value="summary">Summary</option>
        <option value="other">Other</option>
      </select>
    </div>
  </div>

  <app-enhanced-table
    [data]="notes"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [selectedRowId]="selectedRowId"
    [rowIdKey]="'note_id'"
    [addRoute]="'/app/important-notes/create'"
    [addLabel]="'Add Note'"
    [searchPlaceholder]="'Search by note title...'"
    [enableExport]="true"
    [enableDateFilter]="true"
    [showViewButton]="true"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (dateFilterChange)="onDateFilterChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"
    (deleteClick)="onDelete($event)"
    (viewClick)="onView($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>

  <!-- Download Action -->
  <!-- <div class="download-action" *ngIf="getSelectedNote()?.note_file">
    <a 
      [href]="getSelectedNote()?.note_file" 
      target="_blank" 
      class="btn btn-secondary"
      title="Download Note">
      <i class="bi bi-download"></i>
      Download Note
    </a>
  </div> -->
  <!-- Download Action -->
<div class="download-action" *ngIf="getSelectedNote()?.note_file">
  <!-- Option 1: Using a Button (Recommended for actions) -->
  <button 
    (click)="downloadNote()" 
    class="btn btn-secondary"
    title="Download Note">
    <i class="bi bi-download"></i>
    Download Note
  </button>

  <!-- Option 2: If you prefer keeping it as a link -->
  <!-- 
  <a 
    href="javascript:void(0)" 
    (click)="downloadNote()" 
    class="btn btn-secondary"
    title="Download Note">
    <i class="bi bi-download"></i>
    Download Note
  </a> 
  -->
</div>
</div>
