<div class="fee-group-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Fee Group' : 'Create Fee Group' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update fee group details' : 'Add a new fee group' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/fee-groups'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="feeGroupForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Fee Group Name *</label>
          <input
            type="text"
            formControlName="fee_group_name"
            class="form-control"
            placeholder="e.g., Tuition Fees, Transport Fees"
            required
          />
        </div>

        <div class="form-group">
          <label>Fee Group Code</label>
          <input
            type="text"
            formControlName="fee_group_code"
            class="form-control"
            placeholder="e.g., TUIT, TRANS"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          formControlName="fee_group_description"
          class="form-control"
          rows="3"
          placeholder="Enter fee group description..."
        ></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/fee-groups'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || feeGroupForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Fee Group</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
