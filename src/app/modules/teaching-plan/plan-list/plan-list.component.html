<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Teaching Plan Management</h1>
    <p class="page-subtitle">Manage teaching plans by class and subject</p>
  </div>
  <app-enhanced-table
    [data]="plans"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [addRoute]="'/app/teaching-plan/create'"
    [addLabel]="'Add Plan'"
    [searchPlaceholder]="'Search plans...'"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"
    (deleteClick)="onDelete($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
