<div class="visitor-list-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Visitor Management</h1>
      <p class="page-subtitle">Manage visitor entries and check-ins</p>
    </div>
  </div>

  <!-- Additional Filters -->
  <div class="additional-filters filter-panel" [class.expanded]="showFilters">
    <div class="filter-group">
      <label>Category:</label>
      <app-search-select
        [options]="visitorCategoryOptions"
        [(ngModel)]="visitorCategory"
        (valueChange)="onVisitorCategoryChange($event)"
        placeholder="Search or select category">
      </app-search-select>
    </div>
    <div class="filter-group">
      <label>Status:</label>
      <app-search-select
        [options]="visitorStatusOptions"
        [(ngModel)]="status"
        (valueChange)="onStatusChange($event)"
        placeholder="Search or select status">
      </app-search-select>
    </div>
  </div>

  <app-enhanced-table
    [data]="visitors"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [selectedRowId]="selectedRowId"
    [rowIdKey]="'visitor_id'"
    [addRoute]="'/app/visitors/create'"
    [addLabel]="'Add Visitor'"
    [searchPlaceholder]="'Search by name or phone...'"
    [enableExport]="true"
    [enableDateFilter]="true"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (dateFilterChange)="onDateFilterChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
