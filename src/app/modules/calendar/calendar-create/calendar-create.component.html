<div class="calendar-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Calendar Event' : 'Create Calendar Event' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update calendar event details' : 'Add a new calendar event' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/calendar'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="calendarForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Event Title *</label>
          <input
            type="text"
            formControlName="event_title"
            class="form-control"
            placeholder="Enter event title"
            required
          />
        </div>

        <div class="form-group">
          <label>Event Type *</label>
          <select formControlName="event_type" class="form-control" required>
            <option value="Holiday">Holiday</option>
            <option value="Exam">Exam</option>
            <option value="Event">Event</option>
            <option value="Meeting">Meeting</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Start Date *</label>
          <input
            type="date"
            formControlName="start_date"
            class="form-control"
            required
          />
        </div>

        <div class="form-group">
          <label>End Date *</label>
          <input
            type="date"
            formControlName="end_date"
            class="form-control"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          formControlName="description"
          class="form-control"
          rows="4"
          placeholder="Enter event description..."
        ></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/calendar'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || calendarForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Event</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
