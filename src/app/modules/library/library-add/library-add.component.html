<div class="library-add-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Book' : 'Add Book' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update book details' : 'Add a new book to library' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/library'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="bookForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Book Title *</label>
        <input
          type="text"
          formControlName="book_title"
          class="form-control"
          placeholder="Enter book title"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>ISBN</label>
          <input
            type="text"
            formControlName="isbn"
            class="form-control"
            placeholder="Enter ISBN number"
          />
        </div>

        <div class="form-group">
          <label>Author</label>
          <input
            type="text"
            formControlName="author"
            class="form-control"
            placeholder="Enter author name"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Publisher</label>
          <input
            type="text"
            formControlName="publisher"
            class="form-control"
            placeholder="Enter publisher name"
          />
        </div>

        <div class="form-group">
          <label>Category</label>
          <input
            type="text"
            formControlName="category"
            class="form-control"
            placeholder="Enter book category"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Total Copies *</label>
          <input
            type="number"
            formControlName="total_copies"
            class="form-control"
            placeholder="Enter total copies"
            min="1"
            required
          />
        </div>

        <div class="form-group">
          <label>Available Copies *</label>
          <input
            type="number"
            formControlName="available_copies"
            class="form-control"
            placeholder="Enter available copies"
            min="0"
            required
          />
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/library'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || bookForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Add' }} Book</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
