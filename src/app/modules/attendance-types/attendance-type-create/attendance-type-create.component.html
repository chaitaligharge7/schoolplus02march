<div class="attendance-type-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Attendance Type' : 'Create Attendance Type' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update attendance type details' : 'Add a new attendance type' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/attendance-types'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="attendanceTypeForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Attendance Type Name *</label>
          <input
            type="text"
            formControlName="attendance_type_name"
            class="form-control"
            placeholder="e.g., Present, Absent, Late"
            required
          />
        </div>

        <div class="form-group">
          <label>Attendance Type Code</label>
          <input
            type="text"
            formControlName="attendance_type_code"
            class="form-control"
            placeholder="e.g., P, A, L"
          />
        </div>
      </div>

      <div class="form-group">
        <label>
          <input
            type="checkbox"
            formControlName="is_present"
            [checked]="attendanceTypeForm.get('is_present')?.value == 1"
            (change)="onPresentChange($event)"
          />
          Count as Present
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/attendance-types'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || attendanceTypeForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Attendance Type</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
