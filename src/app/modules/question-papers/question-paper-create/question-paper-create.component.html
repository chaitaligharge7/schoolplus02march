<div class="question-paper-create-container">
  <div class="page-header">
    <h1 class="page-title">{{ isEditMode ? 'Edit Question Paper' : 'Create Question Paper' }}</h1>
    <p class="page-subtitle">{{ isEditMode ? 'Update question paper details' : 'Create a new question paper' }}</p>
  </div>

  <div class="form-card" *ngIf="!isLoading">
    <form [formGroup]="paperForm" (ngSubmit)="onSubmit()">
      <div class="form-section">
        <h3>Basic Information</h3>
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Paper Title <span class="required">*</span></label>
            <input
              type="text"
              formControlName="paper_title"
              class="form-control"
              [class.is-invalid]="paperForm.get('paper_title')?.invalid && paperForm.get('paper_title')?.touched"
              placeholder="Enter paper title"
            />
            <div class="invalid-feedback" *ngIf="paperForm.get('paper_title')?.invalid && paperForm.get('paper_title')?.touched">
              Paper title is required
            </div>
          </div>

          <div class="form-group">
            <label>Class <span class="required">*</span></label>
            <select
              formControlName="class_id"
                (change)="onClassChange()"
              class="form-control"
              [class.is-invalid]="paperForm.get('class_id')?.invalid && paperForm.get('class_id')?.touched"
            >
              <option [value]="null">Select Class</option>
              <option *ngFor="let cls of classes" [value]="cls.class_id">
                {{ cls.class_name }}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label>Subject <span class="required">*</span></label>
            <select
              formControlName="subject_id"
                (change)="onSubjectChange()"
              class="form-control"
              [class.is-invalid]="paperForm.get('subject_id')?.invalid && paperForm.get('subject_id')?.touched"
            >
              <option [value]="null">Select Subject</option>
              <option *ngFor="let subject of subjects" [value]="subject.subject_id">
                {{ subject.subject_name }}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label>Exam Type <span class="required">*</span></label>
            <select
              formControlName="exam_type_id"
              class="form-control"
              [class.is-invalid]="paperForm.get('exam_type_id')?.invalid && paperForm.get('exam_type_id')?.touched"
            >
              <option [value]="null">Select Exam Type</option>
              <option *ngFor="let examType of examTypes" [value]="examType.exam_type_id">
                {{ examType.exam_type_name }}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label>Total Marks <span class="required">*</span></label>
            <input
              type="number"
              formControlName="total_marks"
              class="form-control"
              [class.is-invalid]="paperForm.get('total_marks')?.invalid && paperForm.get('total_marks')?.touched"
              min="1"
            />
          </div>

          <div class="form-group">
            <label>Duration (Minutes)</label>
            <input
              type="number"
              formControlName="duration_minutes"
              class="form-control"
              min="1"
            />
          </div>

          <div class="form-group">
            <label>Status <span class="required">*</span></label>
            <select
              formControlName="status"
              class="form-control"
            >
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
          </div>

      
        </div>
      </div>

<div class="form-section">
  <!-- Header with Add button on the right -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Chapters</h5>
    <button type="button" class="btn btn-primary" (click)="addChapter()">
      <i class="bi bi-plus-circle"></i> Add
    </button>
  </div>
<hr>
  <!-- Add some spacing between header and first row -->
  <div class="mt-2 chapters-list" formArrayName="chapters">
    <div *ngFor="let chapter of chaptersArray.controls; let i = index" 
         [formGroupName]="i" class="row g-2 mb-2 align-items-end">
      
      <div class="col">
        <label>Chapter</label>
        <select 
          class="form-control"
          [formControlName]="'chapter_id'"
          (change)="onChapterSelect($event, i)">
          <option [ngValue]="null">Select Chapter</option>
          <option *ngFor="let ch of chapters" [ngValue]="ch.chapter_id">{{ ch.chapter_name }}</option>
        </select>
      </div>

      <div class="col-3">
        <label>Marks</label>
        <input type="number" formControlName="marks_allocation" class="form-control" min="1" />
      </div>

      <div class="col-2 d-grid">
        <button type="button" class="btn btn-danger" (click)="removeChapter(i)">
          <i class="bi bi-trash"></i>
        </button>
      </div>

    </div>
  </div>
</div>


      <div class="form-section">
        <h3>Paper File</h3>
        <div class="form-group">
          <label>Upload Question Paper</label>
          <input
            type="file"
            (change)="onFileSelected($event)"
            accept=".pdf,.jpg,.jpeg,.png"
            class="form-control"
          />
          <small class="form-text text-muted">Allowed formats: PDF, JPG, PNG (Max 10MB)</small>
          <div *ngIf="filePreview" class="file-preview mt-2">
            <a [href]="filePreview" target="_blank" *ngIf="filePreview.startsWith('http')">
              View Current File
            </a>
            <img *ngIf="filePreview.startsWith('data:')" [src]="filePreview" alt="Preview" class="preview-image" />
          </div>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea
            formControlName="description"
            class="form-control"
            rows="4"
            placeholder="Enter paper description"
          ></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isSaving">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || paperForm.invalid">
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Paper</span>
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="isLoading" class="loading-spinner">
    <div class="spinner"></div>
  </div>
</div>
