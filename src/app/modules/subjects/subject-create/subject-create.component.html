<div class="subject-create-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Subject' : 'Create Subject' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update subject details' : 'Add a new subject' }}</p>
    </div>
    <button class="btn btn-outline" (click)="router.navigate(['/app/subjects'])">
      <i class="bi bi-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="subjectForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Subject Name *</label>
          <input
            type="text"
            formControlName="subject_name"
            class="form-control"
            placeholder="e.g., Mathematics, English"
            required
          />
        </div>

        <div class="form-group">
          <label>Subject Code</label>
          <input
            type="text"
            formControlName="subject_code"
            class="form-control"
            placeholder="e.g., MATH, ENG"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Subject Type *</label>
          <app-search-select
            [options]="subjectTypeOptions"
            formControlName="subject_type"
            placeholder="Search or select subject type">
          </app-search-select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Maximum Marks</label>
          <input
            type="number"
            formControlName="max_marks"
            class="form-control"
            placeholder="e.g., 100"
            min="0"
          />
        </div>

        <div class="form-group">
          <label>Passing Marks</label>
          <input
            type="number"
            formControlName="pass_marks"
            class="form-control"
            placeholder="e.g., 35"
            min="0"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          formControlName="subject_description"
          class="form-control"
          rows="3"
          placeholder="Enter subject description..."
        ></textarea>
      </div>

      <div class="form-group">
        <label>Assign to Classes</label>
        <div class="classes-grid">
          <label *ngFor="let cls of classes" class="checkbox-label">
            <input
              type="checkbox"
              [checked]="isClassSelected(cls.class_id)"
              (change)="toggleClass(cls.class_id)"
            />
            {{ cls.class_name }}
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline" (click)="router.navigate(['/app/subjects'])">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="isSaving || subjectForm.invalid">
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }} Subject</span>
          <span *ngIf="isSaving">
            <span class="spinner-small"></span>
            Saving...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
