<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Support & Feedback</h1>
    <p class="page-subtitle">Manage support tickets and feedback</p>
  </div>
  <div class="filters">
    <div class="filter-group">
      <label>Status</label>
      <select class="form-control" [(ngModel)]="status" (change)="onStatusChange(status)">
        <option [value]="undefined">All</option>
        <option value="open">Open</option>
        <option value="in_progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
    </div>
  </div>
  <app-enhanced-table
    [data]="tickets"
    [columns]="columns"
    [pagination]="pagination"
    [loading]="loading"
    [addRoute]="'/app/support-feedback/create'"
    [addLabel]="'Submit Ticket'"
    [searchPlaceholder]="'Search...'"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (searchChange)="onSearchChange($event)"
    (sortChange)="onSortChange($event)"
    (rowSelect)="onRowSelect($event)"
    (refresh)="onRefresh()"
    (addClick)="onAdd()"
    (editClick)="onEdit($event)"
    (exportClick)="onExportClick($event)"
    (filterToggle)="onFilterToggle($event)">
  </app-enhanced-table>
</div>
